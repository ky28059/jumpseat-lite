name: Upsert UIUC shuttles
on:
  push:
    branches:
      - main
    paths:
      - scripts/upsert-uiuc-shuttles.ts
permissions:
  contents: read
jobs:
  upsert:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npx tsx scripts/upsert-uiuc-shuttles.ts
